<!DOCTYPE html>
<html>
<head>
<title>Track Order</title>
</head>

<body style="background:#0b0b10;color:white;text-align:center;">

<h1>Track Your Order</h1>

<input id="orderId" placeholder="Enter Order ID">
<button onclick="track()">Track</button>

<div id="result"></div>

<script>
async function track() {
  const id = document.getElementById("orderId").value;

  const res = await fetch("https://script.google.com/macros/s/AKfycbzTWcvcKy_tIWr16jPtqAFVgObKCicGWIBfyz6HEPCEKjPdb2qW1K4mCJdn9FgutGwg/exec");
  const data = await res.json();

  const order = data.find(o => o.orderId === id);

  if (!order) {
    document.getElementById("result").innerText = "Not found";
    return;
  }

  document.getElementById("result").innerHTML = `
    <h3>${order.orderId}</h3>
    <p>Status: ${order.status}</p>
    <p>Console: ${order.console}</p>
    <p>Price: $${order.price}</p>
    <a href="${order.payment}" target="_blank">Payment Link</a>
  `;
}
</script>

</body>
</html>
