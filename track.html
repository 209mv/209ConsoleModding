<!DOCTYPE html>
<html>
<head>
<title>Track Order</title>

<style>
body {
  font-family: Arial;
  background: #0b0b10;
  color: white;
}

.container {
  max-width: 500px;
  margin: 60px auto;
}

.card {
  background: #161b22;
  padding: 20px;
  border-radius: 12px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}
</style>

</head>

<body>

<div class="container">
<div class="card">

<h2>Track Order</h2>

<input id="orderId" placeholder="ORD-XXXXXX">
<button onclick="track()">Track</button>

<div id="result"></div>

</div>
</div>

<script>
async function track() {
  const id = document.getElementById("orderId").value.toUpperCase();

  const res = await fetch("https://script.google.com/macros/s/AKfycbzxqt2JvH15YV8vMylzSvAeQ-XUQcU-GxFj8g44FA6ZJgHAFgutdWBq2UrdPGnYYbba/exec");
  const data = await res.json();

  const order = data.find(o => o.orderId === id);

  if (!order) {
    document.getElementById("result").innerHTML = "Not found";
    return;
  }

  document.getElementById("result").innerHTML = `
    <p><b>Status:</b> ${order.status}</p>
    <p><b>Console:</b> ${order.console}</p>
    <p><b>Method:</b> ${order.method}</p>
    <p><b>Price:</b> $${order.price}</p>
  `;
}
</script>

</body>
</html>
