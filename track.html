<!DOCTYPE html>
<html>
<head>
<title>Track Order</title>

<style>
body {
  font-family: Arial;
  background: #0b0b10;
  color: white;
  margin: 0;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: rgba(22,27,34,0.95);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 12px 0;
  z-index: 1000;
}

.navbar a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  padding: 8px 14px;
  border-radius: 8px;
  transition: 0.2s;
}

.navbar a:hover {
  background: #3a7bfd;
  transform: scale(1.05);
}

.container {
  max-width: 500px;
  margin: 120px auto 60px auto;
}

.card {
  background: #161b22;
  padding: 20px;
  border-radius: 12px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  cursor: pointer;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <a href="index.html">Order</a>
  <a href="track.html" style="background:#3a7bfd;">Track Here</a>
  <a href="contact.html">Contact</a>
</div>

<div class="container">
<div class="card">

<h2>Track Order</h2>

<input id="orderId" placeholder="ORD-XXXXXX">
<button onclick="track()">Track</button>

<div id="result"></div>

</div>
</div>

<script>

const API_URL =
  "https://script.google.com/macros/s/AKfycbwwgVD5KWy7g2I6MoGtWBnsF1TVF_RdXyFwhq6RO0tLRjLEH5qu79nT9XzjDPF6bvRc/exec";

async function track() {

  const id = document.getElementById("orderId").value.trim().toUpperCase();

  const res = await fetch(API_URL);
  const data = await res.json();

  const order = data.find(o => o.orderId === id);

  if (!order) {
    document.getElementById("result").innerHTML = "Not found";
    return;
  }

  const color =
    order.status === "Done" ? "lime" :
    order.status === "Processing" ? "dodgerblue" :
    order.status === "Pending" ? "orange" :
    "violet";

  document.getElementById("result").innerHTML = `
    <p><b>Status:</b> <span style="color:${color}">${order.status}</span></p>
    <p><b>Console:</b> ${order.console}</p>
    <p><b>Method:</b> ${order.method}</p>
    <p><b>Price:</b> $${order.price}</p>
  `;
}

/* AUTO LOAD FROM EMAIL LINK */
window.onload = async function () {

  const params = new URLSearchParams(window.location.search);
  const orderId = params.get("order");

  if (!orderId) return;

  document.getElementById("orderId").value = orderId;

  track();
};

/* LIVE UPDATE (NO REFRESH) */
setInterval(track, 5000);

</script>

</body>
</html>
