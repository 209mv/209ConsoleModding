<!DOCTYPE html>
<html>
<body style="background:#0b0b10;color:white;text-align:center;font-family:Arial;">

<h1>Track Order (enter everything including ORD-)</h1>

<input id="id" placeholder="Order ID">
<button onclick="track()">Track</button>

<div id="out"></div>

<script>
async function track() {
  const id = document.getElementById("id").value;

  const res = await fetch("https://script.google.com/macros/s/AKfycby9WlMzerm-tqYvuiHySkP6hVMoKjbUew7_RNFaLZmz6oOS0iNjqki5ZkvAzfyQkRtb/exec");
  const data = await res.json();

  const order = data.find(o => o.orderId === id);

  if (!order) {
    document.getElementById("out").innerText = "Not found";
    return;
  }

  document.getElementById("out").innerHTML = `
    <h2>${order.orderId}</h2>
    <p>Status: ${order.status}</p>
    <p>Console: ${order.console}</p>
    <p>Total: $${order.price}</p>
  `;
}
</script>

</body>
</html>
