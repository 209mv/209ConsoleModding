<!DOCTYPE html>
<html>
<head>
<title>Track Order</title>

<style>
body {
  font-family: Arial;
  background: #0b0b10;
  color: white;
}

.container {
  max-width: 500px;
  margin: 60px auto;
}

.card {
  background: #161b22;
  padding: 20px;
  border-radius: 12px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  cursor: pointer;
}

</style>

</head>

<body>

<div class="container">
<div class="card">

<h2>Track Order</h2>

<input id="orderId" placeholder="ORD-XXXXXX">
<button onclick="track()">Track</button>

<div id="result"></div>

</div>
</div>

<script>

const API_URL =
  "https://script.google.com/macros/s/AKfycbwwgVD5KWy7g2I6MoGtWBnsF1TVF_RdXyFwhq6RO0tLRjLEH5qu79nT9XzjDPF6bvRc/exec";

async function track() {

  const id = document.getElementById("orderId").value.trim().toUpperCase();

  const res = await fetch(API_URL);
  const data = await res.json();

  const order = data.find(o => o.orderId === id);

  if (!order) {
    document.getElementById("result").innerHTML = "Not found";
    return;
  }

  const color =
    order.status === "Done" ? "lime" :
    order.status === "Processing" ? "dodgerblue" :
    order.status === "Pending" ? "orange" :
    "violet";

  document.getElementById("result").innerHTML = `
    <p><b>Status:</b> <span style="color:${color}">${order.status}</span></p>
    <p><b>Console:</b> ${order.console}</p>
    <p><b>Method:</b> ${order.method}</p>
    <p><b>Price:</b> $${order.price}</p>
  `;
}

/* ✔ AUTO LOAD FROM EMAIL LINK */
window.onload = async function () {

  const params = new URLSearchParams(window.location.search);
  const orderId = params.get("order");

  if (!orderId) return;

  document.getElementById("orderId").value = orderId;

  track();
};

/* ✔ LIVE UPDATE (NO REFRESH) */
setInterval(track, 5000);

</script>

</body>
</html>
