<!DOCTYPE html>
<html>
<head>
<title>209 Console Modding</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b10;
  color: white;
}

/* top bar */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #111827;
}

.topbar a {
  color: white;
  text-decoration: none;
  padding: 8px 12px;
  background: #3a7bfd;
  border-radius: 8px;
}

.container {
  max-width: 520px;
  margin: 40px auto;
  padding: 20px;
}

.card {
  background: #161b22;
  padding: 25px;
  border-radius: 16px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  background: #0f172a;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #3a7bfd;
  color: white;
}
</style>

</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div>209 Console Modding</div>
  <a href="track.html">Track Order</a>
</div>

<div class="container">
<div class="card">

<h2>Place Order</h2>

<div id="step1">
  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">
</div>

<select id="consoleSelect" onchange="updateTotal()">
  <option value="">Select Console</option>
  <option>Old 3DS</option>
  <option>Old 2DS</option>
  <option>New 3DS</option>
  <option>New 2DS XL</option>
  <option>PSP 2000</option>
  <option>PS Vita 1000</option>
  <option>Wii U</option>
</select>

<select id="serviceSelect" onchange="updatePaymentOptions()">
  <option value="">Service</option>
  <option value="Mail-in">Mail-in</option>
  <option value="Local Pickup">Local Pickup</option>
</select>

<div id="paymentOptions"></div>

<p>Total: $<span id="total">0</span></p>

<button onclick="submitOrder()">Confirm Order</button>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
