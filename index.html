<!DOCTYPE html>
<html>
<head>
<title>209 Console Modding</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0b10;
  color:white;
}

.container {
  max-width:520px;
  margin:40px auto;
  padding:20px;
}

.card {
  background:#161b22;
  padding:20px;
  border-radius:14px;
}

input, select {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:#3a7bfd;
  color:white;
}

.total {
  margin-top:10px;
  padding:10px;
  background:#0f172a;
  border-radius:8px;
}
</style>

</head>

<body>

<div class="container">
<div class="card">

<h2>209 Console Modding</h2>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">

<select id="console">
  <option value="">Select Console</option>
  <option>Old 3DS</option>
  <option>New 3DS XL</option>
  <option>Old 2DS</option>
  <option>New 2DS XL</option>
  <option>DS</option>
  <option>Wii (GameCube Ports)</option>
  <option>Wii (No GameCube Ports)</option>
  <option>Wii Mini</option>
  <option>Wii U</option>
  <option>PSP 1000</option>
  <option>PSP 2000</option>
  <option>PSP 3000</option>
  <option>PSP Go</option>
  <option>PS Vita 1000</option>
  <option>PS Vita 2000</option>
</select>

<select id="method" onchange="updatePayment()">
  <option value="">Method</option>
  <option value="Mail-in">Mail-in</option>
  <option value="Local Pickup">Local Pickup</option>
</select>

<select id="payment"></select>

<div class="total">
Total: $<span id="total">25</span>
</div>

<button onclick="submitOrder()">Confirm Order</button>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
