<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>209 Console Modding</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <h1>209 Console Modding</h1>
  <p>Start your order below</p>
</header>

<div class="category" onclick="toggle(this)">
  <div class="title">🎮 Nintendo 3DS Family</div>
  <div class="items">
    <div class="item" onclick="selectConsole('Old 3DS')">Old 3DS</div>
    <div class="item" onclick="selectConsole('New 3DS XL')">New 3DS XL</div>
    <div class="item" onclick="selectConsole('New 2DS XL')">New 2DS XL</div>
  </div>
</div>

<div class="category" onclick="toggle(this)">
  <div class="title">🎮 PSP</div>
  <div class="items">
    <div class="item" onclick="selectConsole('PSP 1000')">PSP 1000</div>
    <div class="item" onclick="selectConsole('PSP 2000')">PSP 2000</div>
    <div class="item" onclick="selectConsole('PSP 3000')">PSP 3000</div>
    <div class="item" onclick="selectConsole('PSP Go')">PSP Go</div>
  </div>
</div>

<div class="category" onclick="toggle(this)">
  <div class="title">🎮 Wii / Wii U</div>
  <div class="items">
    <div class="item" onclick="selectConsole('Wii')">Wii</div>
    <div class="item" onclick="selectConsole('Wii U')">Wii U</div>
  </div>
</div>

<div class="category" onclick="toggle(this)">
  <div class="title">🎮 PS Vita</div>
  <div class="items">
    <div class="item" onclick="selectConsole('PS Vita 1000')">PS Vita 1000</div>
    <div class="item" onclick="selectConsole('PS Vita 2000')">PS Vita 2000</div>
  </div>
</div>

<div class="form-box">

  <input id="name" placeholder="Full Name">
  <input id="contact" placeholder="Email or Phone">

  <div class="selected">
    Console: <span id="console">None</span>
  </div>

  <div class="selected">
    Service: <span id="service">None</span>
  </div>

  <div class="selected">
    Payment: <span id="payment">None</span>
  </div>

  <div class="service">
    <button onclick="setService('Mail-in')">📦 Mail-in</button>
    <button onclick="setService('Local Pickup')">🤝 Local Pickup</button>
  </div>

  <div id="paymentOptions" class="service"></div>

  <button class="submit" onclick="submitOrder()">Confirm Order</button>

</div>

<script src="script.js"></script>
</body>
</html>
