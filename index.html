<!DOCTYPE html>
<html>
<head>
<title>209 Console Modding</title>

<style>
body {
  font-family: Arial;
  background: #0b0b10;
  color: white;
  text-align: center;
}

input, select, button {
  margin: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #3a7bfd;
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<h1>209 Console Modding</h1>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">

<br>

<select id="consoleSelect" onchange="updateTotal()">
  <option value="">Select Console</option>

  <optgroup label="3DS Family">
    <option>Old 3DS</option>
    <option>Old 2DS</option>
    <option>New 3DS</option>
    <option>New 3DS XL</option>
    <option>New 2DS XL</option>
  </optgroup>

  <optgroup label="PSP">
    <option>PSP 1000</option>
    <option>PSP 2000</option>
    <option>PSP 3000</option>
    <option>PSP Go</option>
  </optgroup>

  <optgroup label="PS Vita">
    <option>PS Vita 1000</option>
    <option>PS Vita 2000</option>
  </optgroup>

  <optgroup label="Nintendo">
    <option>Wii</option>
    <option>Wii U</option>
  </optgroup>
</select>

<br>

<select id="serviceSelect" onchange="updatePaymentOptions()">
  <option value="">Service Type</option>
  <option value="Mail-in">Mail-in</option>
  <option value="Local Pickup">Local Pickup</option>
</select>

<div id="paymentOptions"></div>

<h3>Total: $<span id="total">0</span></h3>

<p style="opacity:0.7;">
If paying with card, please enter the total amount shown above.
</p>

<button onclick="submitOrder()">Confirm Order</button>

<script src="script.js"></script>

</body>
</html>
