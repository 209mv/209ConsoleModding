<!DOCTYPE html>
<html>
<head>
<title>209 Console Modding</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b10;
  color: white;
}

.container {
  max-width: 520px;
  margin: 40px auto;
  padding: 20px;
}

.card {
  background: #161b22;
  padding: 25px;
  border-radius: 16px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  background: #0f172a;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #3a7bfd;
  color: white;
  cursor: pointer;
}

.total {
  margin-top: 10px;
  padding: 10px;
  background: #0f172a;
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="container">
<div class="card">

<h2>209 Console Modding</h2>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">

<select id="consoleSelect" onchange="updateConsole()">
  <option value="">Select Console</option>
  <option>Old 3DS</option>
  <option>Old 2DS</option>
  <option>New 3DS</option>
  <option>New 3DS XL</option>
  <option>New 2DS XL</option>
  <option>PSP 2000</option>
  <option>PS Vita 1000</option>
  <option>Wii U</option>
</select>

<select id="methodSelect" onchange="updateMethod()">
  <option value="">Method</option>
  <option value="Mail-in">Mail-in</option>
  <option value="Local Pickup">Local Pickup</option>
</select>

<div id="paymentBox"></div>

<div class="total">
Total: $<span id="total">0</span>
</div>

<button onclick="submitOrder()">Confirm Order</button>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
