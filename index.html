<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <div style="text-align:center; margin-top:20px;">
  <img src="logo.png" style="
    width:180px;
    height:auto;
    filter: drop-shadow(0px 0px 10px #00aaff);
  ">
</div>
<title>209 Console Modding</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0b10;
  color:white;
  overflow-x:hidden;
}

.container {
  max-width:520px;
  margin:40px auto;
  padding:20px;
}

.card {
  background:rgba(22,27,34,0.85);
  backdrop-filter: blur(10px);
  padding:20px;
  border-radius:16px;
}

input {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

.total {
  margin-top:10px;
  padding:10px;
  background:#0f172a;
  border-radius:8px;
}

/* clickable UI */
.box {
  background:#1f2937;
  padding:12px;
  border-radius:10px;
  margin:6px 0;
  cursor:pointer;
  text-align:center;
  transition:0.2s;
}

.box:hover {
  background:#3a7bfd;
  transform:scale(1.03);
}

.btn {
  background:#1f2937;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  text-align:center;
  margin:6px 0;
  transition:0.2s;
}

.btn:hover {
  background:#3a7bfd;
  transform:scale(1.03);
}
</style>

</head>

<body>

<div class="container">
<div class="card">

<h2>209 Console Modding</h2>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">

<!-- CONSOLE SELECTOR -->
<p><b>Select Console:</b></p>

<div class="box" onclick="selectConsole('Old 3DS')">Old 3DS</div>
<div class="box" onclick="selectConsole('Old 3DS XL')">Old 3DS XL</div>
<div class="box" onclick="selectConsole('New 3DS')">New 3DS</div>
<div class="box" onclick="selectConsole('New 3DS XL')">New 3DS XL</div>

<div class="box" onclick="selectConsole('Old 2DS')">Old 2DS</div>
<div class="box" onclick="selectConsole('New 2DS XL')">New 2DS XL</div>

<div class="box" onclick="selectConsole('DS')">DS</div>

<div class="box" onclick="selectConsole('Wii (GameCube Ports)')">Wii (GameCube Ports)</div>
<div class="box" onclick="selectConsole('Wii (No GameCube Ports)')">Wii (No GameCube Ports)</div>
<div class="box" onclick="selectConsole('Wii Mini')">Wii Mini</div>
<div class="box" onclick="selectConsole('Wii U')">Wii U</div>

<div class="box" onclick="selectConsole('PSP 1000')">PSP 1000</div>
<div class="box" onclick="selectConsole('PSP 2000')">PSP 2000</div>
<div class="box" onclick="selectConsole('PSP 3000')">PSP 3000</div>
<div class="box" onclick="selectConsole('PSP Go')">PSP Go</div>

<div class="box" onclick="selectConsole('PS Vita 1000')">PS Vita 1000</div>
<div class="box" onclick="selectConsole('PS Vita 2000')">PS Vita 2000</div>

<!-- hidden state holders -->
<input type="hidden" id="console">
<input type="hidden" id="method">
<input type="hidden" id="payment">

<!-- METHOD -->
<p style="margin-top:15px;"><b>Method:</b></p>

<div class="btn" onclick="selectMethod('Mail-in')">Mail-in</div>
<div class="btn" onclick="selectMethod('Local Pickup')">Local Pickup</div>

<!-- PAYMENT -->
<p><b>Payment:</b></p>
<div id="paymentOptions"></div>

<!-- TOTAL -->
<div class="total">
Total: $<span id="total">0</span>
</div>

<button class="btn" onclick="submitOrder()">Confirm Order</button>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
